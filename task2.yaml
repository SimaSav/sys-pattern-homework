---
- name: remote_motd
  hosts: all
  become: yes

  tasks:
    - name: custmo_motd
      ansible.builtin.copy:
        content: |
          ==========================================
          Хостнейм : {{ ansible_hostname }}
          IP-адрес : {{ ansible_default_ipv4.address | default('Не определен') }}
          Хорошего дня!
          ==========================================
        dest: /etc/motd
        mode: '0644'
        owner: root
        group: root

    - name: block_default_motd
      ansible.builtin.file:
        path: "/etc/update-motd.d/{{ item }}"
        state: absent
      loop:
        - "10-help-text"
        - "50-motd-news"
        - "90-updates-available"
        - "91-release-upgrade"
        - "95-hwe-eol"
        - "98-reboot-required"
      ignore_errors: yes
