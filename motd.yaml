- name: download
  hosts: localhost
  connection: local
  become: yes
  tasks:
  vars:
    my_custom_motd: |
      ===================================================
       q, {{ansible_hostname}}
      ===================================================

  tasks:
    - name: motd
      ansible.builtin.copy:
        content: "{{ my_custom_motd }}"
        dest: /etc/motd
        mode: '0644'
        owner: root
        group: root

    - name: block_motd
      ansible.builtin.file:
        path: "/etc/update-motd.d/{{ item }}"
        state: absent
      loop:
        - "10-help-text"
        - "50-motd-news"
        - "80-esm"
        - "90-updates-available"
        - "91-release-upgrade"
        - "92-unattended-upgrades"
        - "95-hwe-eol"
        - "98-fsck-at-reboot"
        - "98-reboot-required"
